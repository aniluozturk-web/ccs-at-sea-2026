<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#2a1520">
  <title>See You at Dinner | CCS at Sea 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600&family=Outfit:wght@200;300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --wine: #2a1520; --wine-mid: #3d2233;
      --rose: #c9956b; --rose-light: #dbb08a;
      --ivory: #fdf8f3; --white: #fff;
      --text: #2c2220; --text-mid: #6b5c55; --text-light: #a09590;
      --copper: #b07d56;
    }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideDown { from { opacity: 0; transform: translateY(-12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    @keyframes breathe { 0%, 100% { box-shadow: 0 6px 32px rgba(201,149,107,0.06); } 50% { box-shadow: 0 10px 48px rgba(201,149,107,0.14); } }
    @keyframes circleDraw { from { stroke-dashoffset: 65; } to { stroke-dashoffset: 0; } }
    @keyframes checkDraw { from { stroke-dashoffset: 50; } to { stroke-dashoffset: 0; } }
    @keyframes wave1 { 0% { d: path("M0,40 C120,20 240,60 360,35 C480,10 600,50 720,40 C840,30 960,55 1080,40 L1080,120 L0,120 Z"); } 50% { d: path("M0,45 C120,55 240,25 360,45 C480,60 600,30 720,50 C840,40 960,20 1080,45 L1080,120 L0,120 Z"); } 100% { d: path("M0,40 C120,20 240,60 360,35 C480,10 600,50 720,40 C840,30 960,55 1080,40 L1080,120 L0,120 Z"); } }
    @keyframes wave2 { 0% { d: path("M0,55 C120,45 240,65 360,50 C480,35 600,60 720,55 C840,50 960,40 1080,55 L1080,120 L0,120 Z"); } 50% { d: path("M0,50 C120,60 240,40 360,55 C480,65 600,45 720,50 C840,55 960,65 1080,50 L1080,120 L0,120 Z"); } 100% { d: path("M0,55 C120,45 240,65 360,50 C480,35 600,60 720,55 C840,50 960,40 1080,55 L1080,120 L0,120 Z"); } }
    @keyframes wave3 { 0% { d: path("M0,65 C120,70 240,55 360,68 C480,75 600,60 720,68 C840,72 960,58 1080,65 L1080,120 L0,120 Z"); } 50% { d: path("M0,68 C120,58 240,72 360,65 C480,55 600,72 720,65 C840,60 960,75 1080,68 L1080,120 L0,120 Z"); } 100% { d: path("M0,65 C120,70 240,55 360,68 C480,75 600,60 720,68 C840,72 960,58 1080,65 L1080,120 L0,120 Z"); } }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Outfit', sans-serif; background: var(--ivory); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
    .page { min-height: 100vh; display: flex; flex-direction: column; }

    .hero {
      position: relative; background: var(--wine);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 72px 32px 100px; text-align: center; overflow: hidden;
    }
    .hero::before {
      content: ''; position: absolute; inset: 0; pointer-events: none;
      background: radial-gradient(ellipse at 30% 20%, rgba(201,149,107,0.06) 0%, transparent 50%), radial-gradient(ellipse at 70% 80%, rgba(201,149,107,0.08) 0%, transparent 50%);
    }
    #particles { position: absolute; inset: 0; pointer-events: none; z-index: 1; }
    .waves { position: absolute; bottom: -1px; left: 0; width: 100%; height: 120px; z-index: 2; }
    .waves svg { width: 100%; height: 100%; }
    .wave-path-1 { fill: rgba(253,248,243,0.15); animation: wave1 8s ease-in-out infinite; }
    .wave-path-2 { fill: rgba(253,248,243,0.25); animation: wave2 6s ease-in-out infinite; }
    .wave-path-3 { fill: var(--ivory); animation: wave3 7s ease-in-out infinite; }
    .hero-content { position: relative; z-index: 3; }

    .hero .conf-tag { font-family: 'Cormorant Garamond', Georgia, serif; font-size: 1rem; color: rgba(255,255,255,0.3); letter-spacing: 0.12em; text-transform: uppercase; animation: slideDown 0.8s ease-out 0.2s both; }
    .hero .conf-tag em { font-style: italic; color: var(--rose-light); text-transform: none; letter-spacing: 0; font-weight: 500; }
    .check-anim { margin: 24px auto 18px; width: 56px; height: 56px; animation: fadeUp 0.6s ease-out 0.4s both; }
    .check-anim .circle-svg { stroke: var(--rose-light); stroke-width: 1.5; fill: none; stroke-dasharray: 65; stroke-dashoffset: 65; animation: circleDraw 0.8s ease-out 0.6s forwards; }
    .check-anim .check-svg { stroke: var(--rose-light); stroke-width: 2; fill: none; stroke-dasharray: 50; stroke-dashoffset: 50; stroke-linecap: round; stroke-linejoin: round; animation: checkDraw 0.5s ease-out 1.1s forwards; }
    .hero h1 { font-family: 'Cormorant Garamond', Georgia, serif; font-size: 2.8rem; font-weight: 600; color: #fff; margin: 0 0 8px; animation: fadeUp 0.8s ease-out 0.7s both; }
    .hero .sub { font-family: 'Cormorant Garamond', Georgia, serif; font-size: 1.1rem; color: rgba(255,255,255,0.45); font-style: italic; animation: fadeUp 0.8s ease-out 0.9s both; }

    .content { max-width: 540px; width: calc(100% - 48px); margin: -32px auto 0; position: relative; z-index: 3; }
    .card { background: var(--white); border: 1.5px solid rgba(201,149,107,0.15); border-radius: 18px; padding: 44px 48px; text-align: center; position: relative; overflow: hidden; animation: fadeUp 0.8s ease-out 1.1s both, breathe 7s ease-in-out infinite 4s; }
    .card::before { content: ''; position: absolute; top: -1px; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent 5%, var(--rose) 30%, var(--rose-light) 50%, var(--rose) 70%, transparent 95%); background-size: 200% 100%; animation: shimmer 5s ease-in-out infinite; }
    .detail-row { display: flex; justify-content: center; gap: 36px; margin-bottom: 24px; flex-wrap: wrap; }
    .detail-item { text-align: center; }
    .detail-item .di-label { font-family: 'JetBrains Mono', monospace; font-size: 0.58rem; text-transform: uppercase; letter-spacing: 0.18em; color: var(--text-light); margin-bottom: 4px; }
    .detail-item .di-value { font-family: 'Cormorant Garamond', Georgia, serif; font-size: 1.05rem; font-weight: 600; color: var(--text); }
    .detail-item .di-sub { font-size: 0.76rem; font-weight: 300; color: var(--text-mid); margin-top: 2px; }
    .sep { width: 40px; height: 1px; margin: 20px auto; background: linear-gradient(90deg, transparent, var(--rose-light), transparent); }
    .note { font-family: 'Outfit', sans-serif; font-size: 0.82rem; font-weight: 300; color: var(--text-light); line-height: 1.7; font-style: italic; }
    .download-btn { display: inline-flex; align-items: center; gap: 9px; margin-top: 24px; padding: 13px 30px; background: var(--wine); color: #fff; border: none; border-radius: 10px; font-family: 'Outfit', sans-serif; font-size: 0.84rem; font-weight: 400; text-decoration: none; letter-spacing: 0.03em; position: relative; overflow: hidden; transition: all 0.3s ease; }
    .download-btn::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(201,149,107,0.1), transparent); transition: left 0.5s ease; }
    .download-btn:hover::before { left: 100%; }
    .download-btn:hover { background: var(--wine-mid); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(42,21,32,0.15); }
    .foot { text-align: center; padding: 40px 24px 48px; margin-top: auto; animation: fadeUp 0.8s ease-out 1.3s both; }
    .foot p { font-size: 0.76rem; color: var(--text-light); font-weight: 300; }
    .foot a { color: var(--rose); text-decoration: none; }
    @media (max-width: 640px) { .hero { padding: 56px 24px 80px; } .hero h1 { font-size: 2.2rem; } .card { padding: 32px 24px; } .detail-row { gap: 20px; } }
  </style>
</head>
<body>
<div class="page">
  <div class="hero">
    <canvas id="particles"></canvas>
    <div class="hero-content">
      <p class="conf-tag">CCS <em>at Sea</em> 2026</p>
      <div class="check-anim"><svg width="56" height="56" viewBox="0 0 24 24"><circle class="circle-svg" cx="12" cy="12" r="10"/><polyline class="check-svg" points="7 12.5 10.5 16 17 9"/></svg></div>
      <h1>See you there</h1>
      <p class="sub">Your RSVP has been received.</p>
    </div>
    <div class="waves"><svg viewBox="0 0 1080 120" preserveAspectRatio="none"><path class="wave-path-1" d="M0,40 C120,20 240,60 360,35 C480,10 600,50 720,40 C840,30 960,55 1080,40 L1080,120 L0,120 Z"/><path class="wave-path-2" d="M0,55 C120,45 240,65 360,50 C480,35 600,60 720,55 C840,50 960,40 1080,55 L1080,120 L0,120 Z"/><path class="wave-path-3" d="M0,65 C120,70 240,55 360,68 C480,75 600,60 720,68 C840,72 960,58 1080,65 L1080,120 L0,120 Z"/></svg></div>
  </div>
  <div class="content">
    <div class="card">
      <div class="detail-row">
        <div class="detail-item"><div class="di-label">When</div><div class="di-value">Thursday, 7 May</div><div class="di-sub">18:00 CEST</div></div>
        <div class="detail-item"><div class="di-label">Where</div><div class="di-value">Restaurang Pa Skissernas</div><div class="di-sub">Finngatan 2, Lund</div></div>
      </div>
      <div class="sep"></div>
      <p class="note">This is a reminder only. No need to print or bring this page.</p>
      <a class="download-btn" href="assets/CCS_Dinner_Ticket.pdf" download><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Save dinner details</a>
    </div>
  </div>
  <div class="foot"><p><a href="https://ccsatsea2026.com">ccsatsea2026.com</a></p></div>
</div>
<script>
(function(){const canvas=document.getElementById('particles');const ctx=canvas.getContext('2d');let w,h,particles=[];function resize(){const hero=canvas.parentElement;w=canvas.width=hero.offsetWidth;h=canvas.height=hero.offsetHeight;}class Particle{constructor(){this.reset();}reset(){this.x=Math.random()*w;this.y=h+Math.random()*40;this.size=Math.random()*2+0.5;this.speedY=-(Math.random()*0.4+0.1);this.speedX=(Math.random()-0.5)*0.3;this.opacity=0;this.maxOpacity=Math.random()*0.3+0.05;this.fadeIn=true;}update(){this.y+=this.speedY;this.x+=this.speedX+Math.sin(this.y*0.008)*0.15;if(this.fadeIn){this.opacity+=0.003;if(this.opacity>=this.maxOpacity)this.fadeIn=false;}if(this.y<h*0.15)this.opacity-=0.004;if(this.opacity<=0||this.y<-10)this.reset();}draw(){ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fillStyle=`rgba(201,149,107,${this.opacity})`;ctx.fill();}}function init(){resize();const count=Math.min(Math.floor(w*h/9000),60);particles=[];for(let i=0;i<count;i++){const p=new Particle();p.y=Math.random()*h;p.opacity=Math.random()*p.maxOpacity;p.fadeIn=false;particles.push(p);}}function animate(){ctx.clearRect(0,0,w,h);particles.forEach(p=>{p.update();p.draw();});requestAnimationFrame(animate);}window.addEventListener('resize',resize);init();animate();})();
</script>
</body>
</html>
